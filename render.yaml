services:
  - type: web
    name: ev-motor-digital-twin-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_API_KEY
        sync: false
  - type: web
    name: ev-motor-digital-twin-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run motor/dashboard.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --browser.gatherUsageStats false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: API_BASE_URL
        value: https://ev-motor-digital-twin-api.onrender.com
      - key: APP_API_KEY
        sync: false
